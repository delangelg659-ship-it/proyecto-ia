<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Proyecto IA</title>

    <style>

        body {
            background-color: #f4f7fb;
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
        }

        h1 {
            color: #2563eb;
        }

        form {
            background: white;
            width: 500px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        textarea {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid gray;
            resize: none;
        }

        button {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1d4ed8;
        }

    </style>

</head>

<body>

    <h1>Propuesta de Proyecto IA</h1>

    <form action="/procesar" method="POST">

        <textarea
            name="propuesta"
            rows="10"
            placeholder="Escribe tu propuesta aquí...">
        </textarea>

        <br><br>

        <button type="submit">
            Enviar
        </button>

    </form>

</body>

</html>
